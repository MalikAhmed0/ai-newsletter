name: 🌐 Deploy Feedback Form

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Build feedback form
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
        run: |
          mkdir -p _site
          sed \
            -e "s|__FEEDBACK_TOKEN__|${FEEDBACK_TOKEN}|g" \
            -e "s|__GITHUB_REPO__|${GITHUB_REPO}|g" \
            docs/feedback.template.html > _site/feedback.html
          echo "✅ feedback.html built"

      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
