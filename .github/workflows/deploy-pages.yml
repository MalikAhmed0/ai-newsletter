name: 🌐 Deploy Feedback Form

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Build feedback form
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
        run: |
          mkdir -p gh-pages
          sed \
            -e "s|__FEEDBACK_TOKEN__|${FEEDBACK_TOKEN}|g" \
            -e "s|__GITHUB_REPO__|${GITHUB_REPO}|g" \
            docs/feedback.template.html > gh-pages/feedback.html
          echo "✅ feedback.html built"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
